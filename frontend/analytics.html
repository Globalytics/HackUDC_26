<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics - Globalytics</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        crossorigin="anonymous" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/analytics.css" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
     <!-- Navbar -->
        <nav class="navbar navbar-expand-lg fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand me-auto" href="#">Logo</a>
                
                <div
                    class="offcanvas offcanvas-end"
                    tabindex="-1"
                    id="offcanvasNavbar"
                    aria-labelledby="offcanvasNavbarLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title"
                            id="offcanvasNavbarLabel">Logo</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="offcanvas"
                            aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul
                            class="navbar-nav justify-content-center flex-grow-1 pe-3">
                            <li class="nav-item">
                                <a class="nav-link mx-lg-2"  href="index.html">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link mx-lg-2 " href="datasets.html">Datasets</a>
                            </li>
                            <li class="nav-item">
                              <a class="nav-link mx-lg-2 " href="chatbot.html">Chatbot</a>
                            </li>
                            <li class="nav-item">
                               <a class="nav-link mx-lg-2 active" href="#">Analytics</a>
                            </li>
                        </ul>
                    </div>
                </div>
                <a href="#" class="login-button">Login</a>
                <button
                    class="navbar-toggler pe-0"
                    type="button"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar"
                    aria-controls="offcanvasNavbar"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </nav>
        <!--end Navbar -->

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="container d-flex flex-column align-items-center justify-content-center text-white">
            <h1>Analytics</h1>
            <h2>Select a dataset, table, and chart type to visualize your data.</h2>
        </div>
    </section>

    <!-- Analytics Section -->
    <section class="analytics-section py-5">
        <div class="container">
            <div class="row mb-4">
                <div class="col-md-4 mb-3">
                    <label for="datasetSelect" class="form-label">Dataset:</label>
                    <select id="datasetSelect" class="form-select">
                        <option selected disabled value="">Choose a dataset</option>
                        <option value="Dataset 1">Dataset 1</option>
                        <option value="Dataset 2">Dataset 2</option>
                        <option value="Dataset 3">Dataset 3</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="tableSelect" class="form-label">Table:</label>
                    <select id="tableSelect" class="form-select" disabled>
                        <option selected disabled value="">Select a table</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="chartTypeSelect" class="form-label">Chart Type:</label>
                    <select id="chartTypeSelect" class="form-select" disabled>
                        <option selected disabled value="">Select chart type</option>
                        <option value="bar">Bar</option>
                        <option value="line">Line</option>
                        <option value="pie">Pie</option>
                        <option value="doughnut">Doughnut</option>
                        <option value="radar">Radar</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive mb-4">
                <table class="table table-striped table-bordered" id="dataTable">
                    <thead>
                        <tr>
                            <th>Column 1</th>
                            <th>Column 2</th>
                            <th>Column 3</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>1</td><td>5</td><td>3</td></tr>
                        <tr><td>2</td><td>7</td><td>4</td></tr>
                        <tr><td>3</td><td>2</td><td>8</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="chart-container">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <!-- Custom JS -->
    <script src="./js/analytics.js"></script>
</body>
</html>
