<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot-Globalytics</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./css/chatbot.css" />
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
       <a class="navbar-brand d-flex align-items-cente me-auto" href="#">Globalytics</a>

      <div
        class="offcanvas offcanvas-end"
        tabindex="-1"
        id="offcanvasNavbar"
        aria-labelledby="offcanvasNavbarLabel">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Logo</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas"
            aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
          <ul class="navbar-nav justify-content-center flex-grow-1 pe-3">
            <li class="nav-item">
              <a class="nav-link mx-lg-2" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link mx-lg-2" href="datasets.html">Datasets</a>
            </li>
            <li class="nav-item">
              <a class="nav-link mx-lg-2 active" href="#">Chatbot</a>
            </li>
            <li class="nav-item">
              <a class="nav-link mx-lg-2" href="analytics.html">Analytics</a>
            </li>
          </ul>
        </div>
      </div>

      <a href="#" class="login-button">Login</a>
      <button
        class="navbar-toggler pe-0"
        type="button"
        data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasNavbar"
        aria-controls="offcanvasNavbar"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>
  <!-- end Navbar -->

  <!-- Hero Section -->
  <section class="hero-section">
    <div class="container d-flex flex-column align-items-center justify-content-center text-white" style="height: 100vh;">
      <h1>Chatbot</h1>
      <h2>Select a dataset below to start your conversation with the bot.</h2>
    </div>
  </section>
  <!-- End Hero Section -->

  <!-- Chat Section -->
  <section class="chat-section py-5">
    <div class="container">
      <div class="mb-4">
        <label for="datasetSelect" class="form-label">Select Dataset:</label>
        <select class="form-select" id="datasetSelect">
          <option value="" selected disabled>Loading datasets...</option>
        </select>
        <div class="form-text" id="datasetHint"></div>
      </div>

      <div
        class="chatbox border rounded p-3 mb-3"
        id="chatMessages"
        style="height: 300px; overflow-y: auto; background-color: #f8f9fa;">
        <div class="message bot">Please select a dataset to start chatting.</div>
      </div>

      <form id="chatForm" class="d-flex">
        <input
          type="text"
          id="userInput"
          class="form-control me-2"
          placeholder="Type your message..."
          disabled />
        <button type="submit" id="sendBtn" class="btn btn-success" disabled>Send</button>
      </form>
    </div>
  </section>
  <!-- End Chat Section -->

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <!-- Custom JS (MODULE ENTRYPOINT) -->
  <script type="module" src="./js/chatbot.js"></script>
</body>
</html>
